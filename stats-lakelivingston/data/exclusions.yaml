# Roster hygiene — drops businesses that Google's category graph wrongly
# surfaced in trade searches (hardware stores as "plumbers", rest areas as
# "tree service", car washes as "pressure washing").
#
# Rules run in order:
#   1. If category matches keep_exact → KEEP (overrides everything below)
#   2. If category contains any drop_category_contains token → DROP
#   3. If category matches drop_category_exact → DROP
#   4. If name matches drop_name_contains → DROP
#   5. If place_id in drop_place_ids → DROP
# Everything else stays.

# Categories that LOOK like retail/supply but are how Google labels real
# service companies. Checked before any drop rule.
keep_exact:
  - "Garage door supplier"          # how garage-door repair cos are tagged
  - "Electric generator shop"       # Generac/Kohler dealers do installs

# Substring match, case-insensitive. Retail, attractions, auto, lodging,
# food, government, misc non-service.
drop_category_contains:
  - "store"
  - "supplier"
  - "supply"
  - "dealer"
  - "wholesaler"
  - "wholesale"
  - "rental"
  - "nursery"
