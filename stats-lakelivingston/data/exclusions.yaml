# Exact-match drops that don't fit a substring rule
drop_category_exact:
  - "attractions"
  - "Area"
  - "Lake"
  - "Swimming pool"       # public pools / swim parks (NOT pool contractors)
  - "bars"
  - "hotels"
  - "restaurants"
  - "Foundation"          # ambiguous — the 2 rows are non-profits, not slab work
  - "Dollar store"
  - "Variety store"
  - "General store"
  - "Agricultural service"
  - "Line marking service"
  - "Civil engineering company"
  - "Party equipment rental service"

# Name-based catch for anything whose category slipped through
