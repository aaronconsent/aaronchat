trade: fencing
name: "Fence Contractors"
service_area_note: "Wood, chain-link, and hurricane-rated fencing across rural lots. Livestock fencing is a Texas-specific volume driver — pipe and cattle-guard installs are the bread-and-butter."

number_one_bar:
  reviews_median: auto
  avg_rating_min: auto
  website_required: true
  response_within_hours: 48
  same_day_service: null
  summary: |
    Fencing is a mid-sized professionalized trade — 49 local shops with only
    20% missing a website and 20% under 10 reviews. Not much fat to trim on
    presence, but the leaderboard bar for the top-3 sits at just 356 reviews.
    A local shop with an aggressive review flywheel can hit top-3 in one
    fence season.

companies: []

insights:
  - kind: "opportunity"
    headline: "The top-3 fencing bar sits at just 356 reviews — closable in one season"
    body: |
      Compared to plumbers (2,413 median top-3) and HVAC (3,144), fencing's
      #1 bar is genuinely reachable. Vickery Dirt at #1 with 886 is a
      general-purpose land-work outfit; a fence specialist with 400
      focused-category reviews would lead the market by trade purity alone.
    social_ready: true

  - kind: "gap"
    headline: "20% of fence shops still have no website — worse than roofing, better than lawn care"
    body: |
      Fencing sits in the middle of the presence-score distribution: 80% have
      a site, 84% have claimed their GBP. But the shops that don't are all
      solo operators — the trade would look almost fully-professionalized
      if 10 more one-person shops built a one-page site.
    social_ready: true

  - kind: "quirk"
    headline: "The top-3 mixes true fence specialists with general land-work outfits"
    body: |
      Vickery Dirt and MSC Landscaping both do fencing as one of several
      services. Huntsville Residential Fencing is the only pure-play
      specialist in the top three. That splits the ranking rules: reviewers
      picking a fencing contractor and reviewers picking a "yard guy who
      also does fences" are shopping for different things.
    social_ready: false
