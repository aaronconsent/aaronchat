trade: plumber
name: "Plumbers"
service_area_note: "Serving Livingston, Onalaska, Huntsville, Coldspring, and the 190/59 corridor. Includes Houston- and Conroe-based shops that show up in Lake Livingston searches."

# `auto` means "compute from top-3 medians". Set explicit numbers to override.
number_one_bar:
  reviews_median: auto
  avg_rating_min: auto
  website_required: auto
  response_within_hours: 2         # human insight, not in the data
  same_day_service: true           # human insight, not in the data
  summary: |
    To land in the top 3 for Lake Livingston-area plumbers today, a shop
    needs a claimed Google Business Profile, a mobile-friendly website,
    and enough review velocity that the median top-3 count is out of reach
    for anyone starting from scratch. A serious weekly review push is the
    only lever a middle-of-pack shop can pull to catch up inside 90 days.

# Companies come from stats-lakelivingston/data/contractors_master.csv,
# filtered by trade slug + county overlap. No manual edits needed.
companies: []

insights:
  - kind: "gap"
    headline: "One in three Lake Livingston plumbers has no website"
    body: |
      Of the plumbers who show up in Polk / Walker / San Jacinto Google
      searches, roughly 33% either point at a defunct Wix, a Facebook
      page, or nothing at all. For a homeowner searching from their phone
      with a leak, that's an instant disqualifier — the pro next to them
      with a real site gets the call.
    social_ready: true

  - kind: "opportunity"
    headline: "Median review count is under 50 in the local market — a real review push wins fast"
    body: |
      The Lake Livingston plumber market is small enough that a serious
      review campaign (weekly ask, one-tap link, response drafts) can
      vault a middle-of-pack shop into the top 3 inside 90 days. Compare
      that to Houston, where the top plumbers have 800+ reviews.
    social_ready: true

  - kind: "quirk"
    headline: "Weekend availability is the differentiator, not price"
    body: |
      Reviewers repeatedly cite Saturday/Sunday response over pricing when
      picking a plumber. Shops that hide their weekend policy on the About
      page instead of the header lose calls to whoever names the hours
      first.
    social_ready: false
