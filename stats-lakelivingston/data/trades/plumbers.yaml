# Insights the build script will surface on the trade page. Written by hand;
# rewritten weekly as the data changes.
insights:
  - kind: "gap"
    headline: "34% of plumbers we found have no working website"
    body: |
      Of the plumbers with an active Google Business Profile, roughly one in
      three still points to a defunct Wix, Facebook page, or nothing at all.
      For a homeowner searching from their phone with a leak, that's an
      instant disqualifier — the pro next to them with a real site gets
      the call.
    social_ready: true

  - kind: "opportunity"
    headline: "Median review count is under 50 — a real review push wins fast"
    body: |
      The Lake Livingston plumber market is small enough that a serious
      review campaign (weekly ask, one-tap link, response drafts) can vault
      a middle-of-pack shop into the top 3 inside 90 days. Compare that to
      Houston, where the top plumbers have 800+ reviews.
    social_ready: true

  - kind: "quirk"
    headline: "Weekend availability is the differentiator, not price"
    body: |
      Reviewers repeatedly cite Saturday/Sunday response over pricing when
      picking a plumber. Shops that hide their weekend policy on the About
      page instead of the header lose calls to whoever names the hours
      first.
    social_ready: false
