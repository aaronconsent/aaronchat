# Plumbers around Lake Livingston, TX
# ------------------------------------------------------------
# EVERY row below is a TEMPLATE seeded from generic archetypes so the site
# builds and renders correctly. NOTHING here has been verified against Google
# Business Profile yet. Do NOT publish until research_status flips to "verified".
#
# Weekly research task: look up each business on Google Maps, fill in the
# real values, flip research_status to "verified", and add the review-summary
# blurb. Delete any row that turns out not to exist.
#
# Companies are added in this file — the build script computes ranks,
# leaderboards, and the "#1 bar" from the presence_score derived below.

trade: plumbers
name: "Plumbers"
service_area_note: "Serving Livingston, Onalaska, Coldspring, Trinity, Point Blank, Goodrich, and the 190/59 corridor."

# The "What it takes to be #1" hero — recomputed weekly from the top-3 medians.
# Manually set these numbers to whatever the current top-3 median is (script
# will auto-recompute in a future version once every row is verified).
number_one_bar:
  reviews_median: 47
  avg_rating_min: 4.6
  website_required: true
  response_within_hours: 2
  same_day_service: true
  summary: |
    To land in the top 3 for Lake Livingston plumbers today, a shop needs
    a working, mobile-friendly website, a claimed Google Business Profile
    with at least 47 reviews averaging 4.6+, and a real "response within
    2 hours" promise the reviewers actually cite. Missing any one of those
    drops a company below the median.

