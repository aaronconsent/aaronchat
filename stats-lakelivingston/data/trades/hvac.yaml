insights:
  - kind: "opportunity"
    headline: "HVAC is the most professionalized trade around Lake Livingston — but 20% still have under 10 reviews"
    body: |
      Only 7% of Lake Livingston-area HVAC shops have unclaimed Google
      profiles, and 86% have a working website — best figures across every
      trade in this hub. Yet one in five shops still shows fewer than 10
      Google reviews. That's a shockingly winnable gap in a trade where
      the top three all show 2,000+ reviews.
    social_ready: true

  - kind: "gap"
    headline: "Huntsville dominates: 50 of 91 area HVAC shops are Huntsville-based"
    body: |
      Livingston has 24, Coldspring just 4. If you're the fifth HVAC shop
      in Coldspring, you're one aggressive local-SEO pass away from ranking
      alongside anyone in that town — the leaderboard is genuinely open.
    social_ready: true

  - kind: "quirk"
    headline: "Same-day service is what shows up in the 5-star reviews"
    body: |
      Read the 4.9★ HVAC winners' reviews and the phrase "came out same-day"
      appears more than any pricing keyword. Shops that hide their after-hours
      policy on their About page instead of the header lose the customer
      before they call.
    social_ready: false
