trade: gutter
name: "Gutter Service"
service_area_note: "Seamless installs, leaf-guard retrofits, and quarterly cleaning. Pine-country debris + steep-pitched lakefront roofs = higher-than-average gutter workload."

number_one_bar:
  reviews_median: auto
  avg_rating_min: auto
  website_required: true
  response_within_hours: 48
  same_day_service: null
  summary: |
    Gutters is a small specialist trade — 21 local shops with strong
    professionalization: only 9% unclaimed profiles and 19% no-website. But
    top-3 review-median sits at just 135, an easy bar to clear for a shop
    running a real weekly review flywheel.

companies: []

insights:
  - kind: "opportunity"
    headline: "Top-3 gutter shops have only 135 median reviews — a startable market"
    body: |
      Gutter Gliders leads with 1,000 reviews as an outlier. #2 and #3
      (Squirrels Roofing, Texas Signature Roofing) both cross around 130.
      A dedicated gutter specialist running category-focused review requests
      hits top-3 by review count in a single fall cleaning season.
    social_ready: true

  - kind: "quirk"
    headline: "The top-3 in gutters are all roofing companies moonlighting"
    body: |
      Two of the top three ('Squirrels Roofing' and 'Texas Signature
      Roofing') are primarily roofing shops. A pure-play gutter company
      would own the category on brand alone — the market is currently
      shared with the roofing trade.
    social_ready: true

  - kind: "note"
    headline: "14 of 21 gutter shops are Huntsville-based"
    body: |
      67% concentration in Huntsville — one of the higher rates in this hub.
      Livingston (4), New Waverly (2) — thin coverage outside Huntsville
      means the "Livingston gutter guy" position is genuinely open.
    social_ready: false
