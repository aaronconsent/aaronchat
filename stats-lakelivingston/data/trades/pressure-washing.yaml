insights:
  - kind: "gap"
    headline: "32% of Lake Livingston pressure-washing shops have under 10 reviews"
    body: |
      Pressure washing is an add-on trade — most operators are landscapers
      or handymen who "also do pressure washing". That informality shows in
      review counts: nearly a third of local shops have no meaningful
      review signal. A pure-play specialist with a real reviews program
      dominates the category effortlessly.
    social_ready: true

  - kind: "opportunity"
    headline: "Boat-dock washing is the untapped lakefront niche"
    body: |
      No pressure-washing shop in the local top-10 mentions "boat dock" on
      their homepage. Every Lake Livingston lakefront property has a dock
      that needs a spring wash. First shop to build a "spring dock package"
      page owns the search phrase from day one.
    social_ready: true

  - kind: "note"
    headline: "Category noise: car washes and gas stations in top-3"
    body: |
      Outscraper's pressure_washing category returned car-wash retail
      (WhiteWater Express, Take 5 Oil Change) as top results — Google's
      category graph is polluted for this trade. Manual roster cleanup
      queued. Gap % numbers computed on all businesses so remain
      directional.
    social_ready: false
