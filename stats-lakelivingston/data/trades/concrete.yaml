trade: concrete
name: "Concrete Contractors"
service_area_note: "Driveways, boat ramps, slabs, and stamped patios. Boat-ramp work is the recurring lakefront niche — every Lake Livingston resale event triggers ramp inspections."

number_one_bar:
  reviews_median: auto
  avg_rating_min: auto
