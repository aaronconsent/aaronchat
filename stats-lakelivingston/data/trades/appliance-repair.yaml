trade: appliance_repair
name: "Appliance Repair"
service_area_note: "Refrigerators, ovens, washers/dryers, and dishwashers. Rural East Texas has strong second-hand appliance markets — repair-vs-replace decisions favor repair more than in urban markets."

number_one_bar:
  reviews_median: auto
  avg_rating_min: auto
  website_required: false
  response_within_hours: 24
  same_day_service: false
  summary: |
    Small trade (15 shops) with the second-worst website gap: 46% of Lake
    Livingston-area appliance-repair shops have no website. But only 20%
    have under 10 reviews — the market is professionalized on GBP but
    ignores its own website story. Whoever ships a proper site owns the
    trade.

companies: []

insights:
  - kind: "gap"
    headline: "46% of Lake Livingston appliance-repair shops have no website"
    body: |
      Seven of 15 local appliance-repair shops rely entirely on their GBP
      + Facebook. Homeowners searching "washing machine repair Livingston"
      from a phone want to see brands serviced, warranty policy, and
      response window — none of which fit on a GBP.
    social_ready: true

  - kind: "opportunity"
    headline: "Brand-specialization is unclaimed territory"
    body: |
      No local appliance-repair shop leads with a specific brand ("Whirlpool
      certified", "Sub-Zero specialist") on their homepage. Every branded
      appliance manufacturer publishes an authorized-repair partner list.
      A shop that appears on those lists AND names it on the homepage
      captures every warranty search for that brand.
    social_ready: true

  - kind: "quirk"
    headline: "Sears Appliance Repair still holds #2 — a legacy foothold worth studying"
    body: |
      Sears Appliance Repair with 205 reviews at #2 is a fading national
      brand still dominating a rural East Texas category. That's a signal
      about how sticky "the name people learned to trust in the 80s" can
      be in service markets with limited competition.
    social_ready: false
