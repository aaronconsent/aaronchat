# Site-wide configuration for stats.lakelivingston.aaron.chat
name: "The Lake Livingston Service Pro Report"
tagline: "Weekly-updated competitive research on the service businesses working around Lake Livingston, Texas."
domain: "stats.lakelivingston.aaron.chat"
publisher: "Hey Aaron! Marketing"
publisher_url: "https://aaron.chat/"

# Service area — the geographic bounds this hub covers.
service_area:
  primary: "Lake Livingston, TX"
  towns:
    - Livingston
    - Onalaska
    - Corrigan
    - Goodrich
    - Leggett
    - Huntsville
    - New Waverly
    - Riverside
    - Coldspring
    - Shepherd
    - Point Blank
    - Oakhurst
  counties: [Polk, Walker, San Jacinto]

# County keys used in the contractors CSV (county_keys_seen JSON array).
# Businesses that surfaced in any of these counties count for the hub.
county_keys: [polk, walker, san_jacinto]

# Trades tracked. `discovery_slug` maps to the slug used in
# discovery/output/contractors_master.csv's `trades` JSON array.
trades:
  - key: plumbers
    discovery_slug: plumber
    name: "Plumbers"
    icon: "🚰"
    tagline: "Water heaters, slab leaks, septic connections, remodels."

  - key: hvac
    discovery_slug: hvac
    name: "HVAC + AC Service"
    icon: "❄️"
    tagline: "Summer's brutal on Lake Livingston. This trade prints money in June."

  - key: electricians
    discovery_slug: electrician
    name: "Electricians"
    icon: "⚡"
    tagline: "Boat-house wiring, panel upgrades, generator installs."

  - key: roofing
    discovery_slug: roofing
    name: "Roofing Contractors"
    icon: "🏠"
    tagline: "Storm-damage claims, metal-roof retrofits, insurance work."

  - key: garage-door
