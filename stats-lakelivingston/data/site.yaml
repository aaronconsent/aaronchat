attribution: |
  Business data captured via Outscraper's Google Maps API, deduped by
  place_id, and filtered to businesses that surfaced in Polk, Walker, or
  San Jacinto county searches. Presence Score is computed from public
  signals only. If we got something wrong, email hello@aaron.chat.
