# Site-wide configuration for stats.lakelivingston.aaron.chat
name: "The Lake Livingston Service Pro Report"
tagline: "Weekly-updated competitive research on the service businesses working around Lake Livingston, Texas."
domain: "stats.lakelivingston.aaron.chat"
publisher: "Hey Aaron! Marketing"
publisher_url: "https://aaron.chat/"

# Service area — the geographic bounds this hub covers.
service_area:
  primary: "Lake Livingston, TX"
  towns:
    - Livingston
    - Onalaska
    - Coldspring
    - Trinity
    - Point Blank
    - Goodrich
    - Shepherd
    - Riverside
    - New Waverly
    - Willis
  counties: [Polk, San Jacinto, Trinity, Walker]

# Trades tracked in this hub. Each key maps to data/trades/<key>.yaml.
# Order controls appearance in the home page grid.
trades:
  - key: plumbers
    name: "Plumbers"
    icon: "🚰"
    tagline: "Water heaters, slab leaks, septic connections, remodels."
    status: seeded          # seeded | researched | published
  - key: hvac
    name: "HVAC + AC Service"
    icon: "❄️"
    tagline: "Summer's brutal on Lake Livingston. This trade prints money in June."
    status: draft
  - key: electricians
    name: "Electricians"
    icon: "⚡"
    tagline: "Boat-house wiring, panel upgrades, generator installs."
    status: draft

# Attribution + methodology one-liners shown site-wide
attribution: |
  Data collected weekly from Google Business Profile, Yelp, Better Business
  Bureau, and the company's own website. If we got something wrong, email
  hello@aaron.chat and we'll correct it in the next weekly build.
