name: aaron.chat bluesky analytics

on:
  schedule:
    - cron: '30 6 * * *'         # daily 06:30 UTC (~1:30 CT) — after the day's engagement has stabilized
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: compute rows, do not commit'
        type: boolean
        default: false
      lookback_days:
        description: 'How many days of own-post history to snapshot'
        default: '30'

concurrency:
  group: aaronchat-bluesky-analytics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet requests pyyaml beautifulsoup4 atproto Pillow

      - name: Fetch secrets from Connect Wizard (Cloudflare Worker)
        env:
          SECRETS_FETCH_TOKEN: ${{ secrets.SECRETS_FETCH_TOKEN }}
          SECRETS_FETCH_URL: ${{ vars.SECRETS_FETCH_URL || 'https://aaron.chat/api/secrets' }}
        run: |
          set -euo pipefail
          mkdir -p secrets && chmod 700 secrets
          if [ -z "${SECRETS_FETCH_TOKEN:-}" ]; then
            echo "::error::SECRETS_FETCH_TOKEN missing — add it to repo Actions Secrets."
            exit 1
          fi
          echo "Fetching secrets from $SECRETS_FETCH_URL"
          # Write body + capture HTTP code separately so we can fail with a real message.
          http=$(curl -sS -o /tmp/secrets-resp -w "%{http_code}" \
                       -H "Authorization: Bearer $SECRETS_FETCH_TOKEN" \
                       "$SECRETS_FETCH_URL")
          if [ "$http" != "200" ]; then
            echo "::error::secrets endpoint returned HTTP $http"
            echo "--- body ---"; head -c 500 /tmp/secrets-resp; echo
            exit 1
          fi
          python3 - <<'PY'
          import json, os, sys
          with open("/tmp/secrets-resp") as f:
              raw = f.read()
          if not raw.strip():
              sys.exit("::error::secrets endpoint returned an empty body")
          try:
              d = json.loads(raw)
          except json.JSONDecodeError as e:
              sys.exit(f"::error::secrets response was not JSON: {e}. body[:200]={raw[:200]!r}")
          if not d.get("ok"):
              sys.exit(f"::error::secrets endpoint error: {d.get('error')}")
          n = 0
          for channel, body in (d.get("secrets") or {}).items():
              p = f"secrets/{channel}.env"
              with open(p, "w") as f: f.write(body if body.endswith("\n") else body + "\n")
              os.chmod(p, 0o600)
              n += 1
          print(f"total: {n} channel secrets recreated")
          PY

      - name: Snapshot Bluesky analytics
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && FLAGS="$FLAGS --dry-run"
          LOOKBACK="${{ github.event.inputs.lookback_days }}"
          [ -n "$LOOKBACK" ] && FLAGS="$FLAGS --lookback-days $LOOKBACK"
          python3 scripts/bluesky_analytics_runner.py $FLAGS

      - name: Commit analytics
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "aaron-chat-bot"
          git config user.email "hello+bot@aaron.chat"
          git add -f content/analytics/bluesky/*.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no analytics changes to commit"
          else
            git commit -m "chore(analytics): bluesky nightly $(date -u +%FT%TZ)"
            git push
          fi
