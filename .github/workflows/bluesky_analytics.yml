name: aaron.chat bluesky analytics

on:
  schedule:
    - cron: '30 6 * * *'         # daily 06:30 UTC (~1:30 CT) — after the day's engagement has stabilized
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: compute rows, do not commit'
        type: boolean
        default: false
      lookback_days:
        description: 'How many days of own-post history to snapshot'
        default: '30'

concurrency:
  group: aaronchat-bluesky-analytics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet requests pyyaml beautifulsoup4 atproto Pillow

      - name: Fetch secrets from Connect Wizard (Cloudflare Worker)
        env:
          SECRETS_URL: ${{ secrets.SECRETS_URL }}
          SECRETS_FETCH_TOKEN: ${{ secrets.SECRETS_FETCH_TOKEN }}
        run: |
          mkdir -p secrets && chmod 700 secrets
          python3 <<'PY'
          import os, urllib.request, json
          url = os.environ["SECRETS_URL"]
          tok = os.environ["SECRETS_FETCH_TOKEN"]
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {tok}"})
          d = json.loads(urllib.request.urlopen(req, timeout=30).read())
          n = 0
          for channel, body in (d.get("secrets") or {}).items():
              p = f"secrets/{channel}.env"
              with open(p, "w") as f: f.write(body if body.endswith("\n") else body + "\n")
              os.chmod(p, 0o600)
              n += 1
          print(f"total: {n} channel secrets recreated")
          PY

      - name: Snapshot Bluesky analytics
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && FLAGS="$FLAGS --dry-run"
          LOOKBACK="${{ github.event.inputs.lookback_days }}"
          [ -n "$LOOKBACK" ] && FLAGS="$FLAGS --lookback-days $LOOKBACK"
          python3 scripts/bluesky_analytics_runner.py $FLAGS

      - name: Commit analytics
        if: always() && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "aaron-chat-bot"
          git config user.email "hello+bot@aaron.chat"
          git add -f content/analytics/bluesky/*.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no analytics changes to commit"
          else
            git commit -m "chore(analytics): bluesky nightly $(date -u +%FT%TZ)"
            git push
          fi
