name: deploy stats.lakelivingston

# Auto-deploys stats.lakelivingston.aaron.chat to GitHub Pages.
# Triggers on any data / template / build script change, plus manual dispatch.
# Uses the modern Pages Actions flow (no gh-pages branch, no /docs restriction).

on:
  push:
    branches: [main]
    paths:
      - 'stats-lakelivingston/data/**'
      - 'stats-lakelivingston/scripts/**'
      - 'stats-lakelivingston/templates/**'
      - 'stats-lakelivingston/assets/**'
      - '.github/workflows/build-stats.yml'
  workflow_dispatch:

# GH Pages deploy tokens
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; queue new pushes
concurrency:
  group: stats-lakelivingston-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stats-lakelivingston
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Build docs/
        run: python3 scripts/build.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stats-lakelivingston/docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
