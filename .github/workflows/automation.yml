name: aaron.chat automation

on:
  schedule:
    - cron: '5 * * * *'          # hourly at :05 UTC — runners self-gate to their windows
  workflow_dispatch:
    inputs:
      force:
        description: 'Force post now, bypass window/cap/spacing gates'
        type: boolean
        default: false
      dry_run:
        description: 'Dry-run: log what would post, publish nothing'
        type: boolean
        default: false

concurrency:
  group: aaronchat-automation
  cancel-in-progress: false

permissions:
  contents: write                # so the run can commit state + log back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: America/Chicago        # keep runners' local-time gates aligned with the tenant tz
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install deps
        run: pip install --quiet requests pyyaml beautifulsoup4 atproto Pillow

      - name: Fetch secrets from Connect Wizard (Cloudflare Worker)
        env:
          SECRETS_FETCH_TOKEN: ${{ secrets.SECRETS_FETCH_TOKEN }}
          SECRETS_FETCH_URL: ${{ vars.SECRETS_FETCH_URL || 'https://aaron.chat/api/secrets' }}
        run: |
          set -euo pipefail
          mkdir -p secrets && chmod 700 secrets
          if [ -z "${SECRETS_FETCH_TOKEN:-}" ]; then
            echo "SECRETS_FETCH_TOKEN missing — add it to repo Actions Secrets."
            echo "(Wizard endpoint auth-checks this bearer token before returning credentials.)"
            exit 1
          fi
          echo "Fetching secrets from $SECRETS_FETCH_URL"
          resp="$(curl -fsSL -H "Authorization: Bearer $SECRETS_FETCH_TOKEN" "$SECRETS_FETCH_URL")"
          # resp: {"ok":true,"secrets":{"buffer":"BUFFER_TOKEN=...\n...", "bluesky":"...", ...}}
          echo "$resp" | python3 - <<'PY'
          import json, os, sys, stat
          d = json.load(sys.stdin)
          if not d.get("ok"):
              sys.exit(f"secrets endpoint error: {d.get('error')}")
          n = 0
          for channel, body in (d.get("secrets") or {}).items():
              p = f"secrets/{channel}.env"
              with open(p, "w") as f: f.write(body if body.endswith("\n") else body + "\n")
              os.chmod(p, 0o600)
              n += 1
              print(f"wrote {p} ({os.path.getsize(p)} bytes)")
          print(f"total: {n} channel secrets recreated")
          PY

      - name: Run all channel runners
        run: |
          FLAGS=""
          [ "${{ github.event.inputs.force }}" = "true" ] && FLAGS="$FLAGS --force"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && FLAGS="$FLAGS --dry-run"
          python3 scripts/run_all.py $FLAGS

      - name: Commit state + log
        if: always()
        run: |
          git config user.name "aaron-chat-bot"
          git config user.email "hello+bot@aaron.chat"
          # Add any state files + the run log (both are .gitignored except when explicitly added)
          git add -f content/*_state.json content/run_all.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "chore(runtime): update posting state $(date -u +%FT%TZ)"
            git push
          fi
