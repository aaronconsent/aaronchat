# Credibility Kit — canonical entity facts for aaron.chat
#
# Feeds `scripts/build_credibility_queue.py`, which generates a small,
# deterministic set of "credibility mode" posts across every enabled channel.
# These posts reinforce the entity/AEO graph — every post carries a canonical
# URL, and the collection stays small enough to feel intentional (not spam).
#
# Edit by hand. Regenerate the queue with:
#   python3 scripts/build_credibility_queue.py

entity:
  name: "Hey Aaron! Marketing"
  founder: "Aaron Phillips"
  tagline: "Marketing for East Texas service pros."
  elevator_pitch: |
    Hey Aaron! Marketing builds websites, runs local SEO, and manages Google
    Business Profiles for contractors and service businesses across East Texas.
  home_url: "https://aaron.chat/"
  city: "Livingston, TX"
  region: "East Texas"

# sameAs graph — every profile you own. Post one "same person, different room"
# post per handle so search + AI engines wire the identities together.
same_as:
  - label: "Facebook"
    url: "https://www.facebook.com/heyaaronmarketing"
  - label: "X"
    url: "https://x.com/heyaaaron"
  - label: "LinkedIn"
    url: "https://www.linkedin.com/in/aaronphillips/"
  - label: "Instagram"
    url: "https://instagram.com/heyaaaron"
  - label: "TikTok"
    url: "https://www.tiktok.com/@heyaaaron"
  - label: "YouTube"
    url: "https://www.youtube.com/@heyaaronmarketing"
  - label: "Mastodon"
    url: "https://mastodon.social/@heyaaron"
  - label: "Bluesky"
    url: "https://bsky.app/profile/heyaaron.bsky.social"

