# FAQ Q&A — one credibility post per pair. Answer is authoritative, links home.
faq:
  - q: "Do you only work with East Texas service pros?"
    a: "Yes — we focus on contractors and service businesses across East Texas so we understand the towns, trades, and buying patterns."
    url: "https://aaron.chat/about/"
  - q: "What is the House Special?"
    a: "A free website and local SEO for year one, then $250/mo starting year two. Built for East Texas contractors who want to test us before committing."
    url: "https://aaron.chat/plans/house-special/"
  - q: "How long before I rank in Google Maps?"
    a: "Most service pros see meaningful rank movement in 60-90 days when the GBP profile, on-page content, and citations are all handled together."
    url: "https://aaron.chat/services/rank-me-local/"
  - q: "Do you require long contracts?"
    a: "No long contracts. Month-to-month on every service so you can leave the moment we stop earning our keep."
    url: "https://aaron.chat/pricing/"

